<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Bidireccional USD ↔ VES</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 20px;
        }
        
        .calculator-container {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        
        .calculator-header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }
        
        .calculator-header h1 {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }
        
        .exchange-rate {
            font-size: 0.85rem;
            opacity: 0.9;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px;
            border-radius: 5px;
            margin-top: 8px;
        }
        
        .mode-toggle {
            margin-top: 10px;
        }
        
        .toggle-btn {
            background: #ff9800;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        
        .toggle-btn:hover {
            background: #f57c00;
            transform: scale(1.05);
        }
        
        .display-container {
            padding: 15px 20px;
            background-color: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .currency-label {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #6c757d;
        }
        
        .display {
            width: 100%;
            height: 60px;
            background-color: #ffffff;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1.8rem;
            text-align: right;
            padding: 0 15px;
            margin-bottom: 10px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .conversion-result {
            width: 100%;
            height: 50px;
            background-color: #e8f5e9;
            border: 1px solid #c8e6c9;
            border-radius: 10px;
            font-size: 1.2rem;
            text-align: right;
            padding: 0 15px;
            line-height: 50px;
            color: #2e7d32;
            font-weight: bold;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 15px;
        }
        
        button {
            border: none;
            border-radius: 10px;
            padding: 12px 0;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(0, 0, 0, 0.1);
        }
        
        .number {
            background-color: #f8f9fa;
            color: #333;
        }
        
        .number:hover {
            background-color: #e9ecef;
        }
        
        .operator {
            background-color: #4a6572;
            color: white;
        }
        
        .operator:hover {
            background-color: #344955;
        }
        
        .equals {
            background-color: #ff9800;
            color: white;
        }
        
        .equals:hover {
            background-color: #f57c00;
        }
        
        .clear {
            background-color: #e53935;
            color: white;
        }
        
        .clear:hover {
            background-color: #c62828;
        }
        
        .zero {
            grid-column: span 2;
        }
        
        .error-message {
            color: #e53935;
            text-align: center;
            padding: 8px;
            font-size: 0.8rem;
        }
        
        .footer {
            text-align: center;
            padding: 8px;
            font-size: 0.75rem;
            color: #6c757d;
            border-top: 1px solid #e9ecef;
        }
        
        .flag {
            display: inline-block;
            margin: 0 3px;
            font-size: 1em;
        }
        
        .input-label, .output-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="calculator-header">
            <h1>Calculadora USD ↔ VES</h1>
<h2>Jmartinez</h2>
            <div class="exchange-rate">
                <span class="flag">🇺🇸</span> 1 USD = <span id="exchange-rate">Cargando...</span> VES <span class="flag">🇻🇪</span>
            </div>
            <div class="mode-toggle">
                <button class="toggle-btn" id="mode-toggle">Cambiar a VES → USD</button>
            </div>
        </div>
        
        <div class="display-container">
            <div class="input-label" id="input-label">
                <span class="flag">🇺🇸</span> Ingresa cantidad en Dólares (USD)
            </div>
            <input type="text" class="display" id="display" readonly value="0">
            <div class="output-label" id="output-label">
                <span class="flag">🇻🇪</span> Resultado en Bolívares (VES)
            </div>
            <div class="conversion-result" id="conversion-result">0,00 Bs.S</div>
        </div>
        
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendToDisplay('/')">/</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>
            
            <button class="number" onclick="appendToDisplay('7')">7</button>
            <button class="number" onclick="appendToDisplay('8')">8</button>
            <button class="number" onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            
            <button class="number" onclick="appendToDisplay('4')">4</button>
            <button class="number" onclick="appendToDisplay('5')">5</button>
            <button class="number" onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <button class="number" onclick="appendToDisplay('1')">1</button>
            <button class="number" onclick="appendToDisplay('2')">2</button>
            <button class="number" onclick="appendToDisplay('3')">3</button>
            <button class="equals" onclick="calculate()" rowspan="2">=</button>
            
            <button class="number zero" onclick="appendToDisplay('0')">0</button>
            <button class="number" onclick="appendToDisplay('.')">.</button>
        </div>
        
        <div class="error-message" id="error-message"></div>
        
        <div class="footer">
            Realiza operaciones y convierte entre Dólares y Bolívares
        </div>
    </div>

    <script>
        // Variable para almacenar la tasa de cambio actual (USD a VES)
        let exchangeRate = 1;
        // Variable para controlar el modo (true: USD → VES, false: VES → USD)
        let isUsdToVesMode = true;
        
        // Obtener elementos del DOM
        const display = document.getElementById('display');
        const conversionResult = document.getElementById('conversion-result');
        const exchangeRateElement = document.getElementById('exchange-rate');
        const errorMessage = document.getElementById('error-message');
        const modeToggle = document.getElementById('mode-toggle');
        const inputLabel = document.getElementById('input-label');
        const outputLabel = document.getElementById('output-label');
        
        // Función para obtener la tasa de cambio actual
        async function fetchExchangeRate() {
            try {
                // En un entorno real, usarías una API como:
                 const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                 const data = await response.json();
                 exchangeRate = data.rates.VES;
                
                // Para este ejemplo, simulamos una tasa de cambio actualizada
                //1 USD = 36.50 VES (ejemplo, actualiza según la tasa real)
                //exchangeRate = 36.50;
                exchangeRateElement.textContent = `${exchangeRate.toFixed(2)}`;
                
                // Actualizar también el resultado si ya hay un valor en pantalla
                if (display.value !== '0') {
                    calculate();
                }
            } catch (error) {
                console.error('Error al obtener la tasa de cambio:', error);
                exchangeRateElement.textContent = 'Error al cargar tasa';
            }
        }
        
        // Función para cambiar entre modos
        function toggleMode() {
            isUsdToVesMode = !isUsdToVesMode;
            
            if (isUsdToVesMode) {
                modeToggle.textContent = 'Cambiar a VES → USD';
                inputLabel.innerHTML = '<span class="flag">🇺🇸</span> Ingresa cantidad en Dólares (USD)';
                outputLabel.innerHTML = '<span class="flag">🇻🇪</span> Resultado en Bolívares (VES)';
            } else {
                modeToggle.textContent = 'Cambiar a USD → VES';
                inputLabel.innerHTML = '<span class="flag">🇻🇪</span> Ingresa cantidad en Bolívares (VES)';
                outputLabel.innerHTML = '<span class="flag">🇺🇸</span> Resultado en Dólares (USD)';
            }
            
            // Actualizar el cálculo si hay un valor en pantalla
            if (display.value !== '0') {
                calculate();
            } else {
                conversionResult.textContent = isUsdToVesMode ? '0,00 Bs.S' : '$0.00';
            }
        }
        
        // Función para agregar valores a la pantalla
        function appendToDisplay(value) {
            errorMessage.textContent = '';
            
            if (display.value === '0' && value !== '.') {
                display.value = value;
            } else {
                display.value += value;
            }
        }
        
        // Función para limpiar la pantalla
        function clearDisplay() {
            display.value = '0';
            conversionResult.textContent = isUsdToVesMode ? '0,00 Bs.S' : '$0.00';
            errorMessage.textContent = '';
        }
        
        // Función para eliminar el último carácter
        function deleteLast() {
            if (display.value.length > 1) {
                display.value = display.value.slice(0, -1);
            } else {
                display.value = '0';
            }
            errorMessage.textContent = '';
            
            // Si después de borrar queda algo, calcular de nuevo
            if (display.value !== '0') {
                calculate();
            } else {
                conversionResult.textContent = isUsdToVesMode ? '0,00 Bs.S' : '$0.00';
            }
        }
        
        // Función para calcular el resultado
        function calculate() {
            try {
                // Evaluar la expresión matemática
                let result = eval(display.value);
                
                // Verificar si el resultado es válido
                if (isNaN(result) || !isFinite(result)) {
                    throw new Error('Operación no válida');
                }
                
                // Mostrar el resultado
                display.value = result;
                
                // Convertir según el modo
                let converted;
                let formattedResult;
                
                if (isUsdToVesMode) {
                    // Modo USD → VES
                    converted = result * exchangeRate;
                    formattedResult = `${formatCurrency(converted)} Bs.S`;
                } else {
                    // Modo VES → USD
                    converted = result / exchangeRate;
                    formattedResult = `$${converted.toFixed(2)}`;
                }
                
                conversionResult.textContent = formattedResult;
                
            } catch (error) {
                errorMessage.textContent = 'Error: Operación no válida';
                console.error('Error en el cálculo:', error);
            }
        }
        
        // Función para formatear la moneda con separadores de miles y decimales
        function formatCurrency(value) {
            return value.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
        }
        
        // Permitir el uso del teclado
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            // Números y operadores
            if (/[\d+\-*/.=]/.test(key)) {
                if (key === '=' || key === 'Enter') {
                    calculate();
                } else {
                    appendToDisplay(key);
                }
            }
            
            // Teclas especiales
            switch(key) {
                case 'Escape':
                    clearDisplay();
                    break;
                case 'Backspace':
                    deleteLast();
                    break;
                case 'm':
                case 'M':
                    // Tecla M para cambiar modo
                    toggleMode();
                    break;
            }
        });
        
        // Inicializar la calculadora
        window.onload = function() {
            fetchExchangeRate();
            
            // Agregar evento al botón de cambio de modo
            modeToggle.addEventListener('click', toggleMode);
            
            // Actualizar la tasa cada 30 segundos (simulado)
            setInterval(fetchExchangeRate, 30000);
        };
    </script>
</body>
</html>
